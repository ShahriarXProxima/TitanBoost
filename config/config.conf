# TitanBoost Configuration File
# Place this file at: /sdcard/TitanBoost/config.conf

# Operating mode: balanced, gaming, extreme
# - balanced: Moderate optimizations, stock thermal behavior
# - gaming: Aggressive optimizations for gaming performance
# - extreme: Maximum performance, prioritize raw speed
MODE=balanced

# CPU Profile: balanced, gaming, extreme
# - balanced: Mid-range frequency scaling, schedutil governor
# - gaming: Higher frequencies, performance governor, all cores enabled
# - extreme: Maximum frequency, locked performance governor, all cores
CPU_PROFILE=balanced

# GPU Profile: balanced, gaming, extreme
# - balanced: Mid-range frequency scaling
# - gaming: Higher minimum frequencies, bus control enabled
# - extreme: Maximum frequency, bus and clock forced on
GPU_PROFILE=balanced

# Enable RAM cleaning on profile switch: true/false
RAM_CLEAN=false

# Enable aggressive background process cleanup: true/false
# WARNING: May kill user apps, check whitelist.txt
BACKGROUND_CLEAN=false

# Thermal profile: balanced, gaming, extreme, none
# - balanced: Stock thermal mitigation
# - gaming: Moderate throttle relaxation
# - extreme: Performance-first tuning (monitor temperature!)
# - none: No thermal modifications
THERMAL_PROFILE=balanced

